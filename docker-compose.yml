version: '3.8'

services:
  nexus-ai:
    build: .
    ports:
      - "4123:4123"
    environment:
      - NODE_ENV=production
      - NOVA_AUTH_TOKEN=${NOVA_AUTH_TOKEN}
      - NOVA_ENCRYPTION_KEY=${NOVA_ENCRYPTION_KEY}
      - NOVA_DB_PATH=/app/data/nova.db
      - NOVA_HOST=0.0.0.0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
